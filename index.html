<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Chef Perso</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      button, input, select { touch-action: manipulation; }
      .input-error { border-color: #ef4444 !important; border-width: 2px !important; }
      * { word-wrap: break-word; }
    </style>
    <link rel="icon" type="image/png" href="https://images.postimages.cc/2361013832280267474.png">
    <link rel="apple-touch-icon" href="https://images.postimages.cc/2361013832280267474.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Chef Perso">
  </head>
  <body class="bg-slate-100 p-2 sm:p-4 min-h-screen text-slate-800 font-sans w-full overflow-x-hidden box-border">
    
    <div id="menu_principal" class="etape flex flex-col gap-4 w-full max-w-md mx-auto">
      <h1 class="text-2xl font-black text-center text-slate-700 mt-4 mb-2 uppercase tracking-wider">Chef Perso</h1>
      
      <button type="button" onclick="chargerMenus()" class="h-20 bg-indigo-500 text-white font-bold rounded-2xl shadow-lg flex items-center justify-between px-6 active:scale-95 transition-all">
        <span class="text-lg">📅 Mes menus planifiés</span>
        <span class="text-2xl">➔</span>
      </button>
      
      <button type="button" onclick="changerVue('etape1')" class="h-20 bg-blue-500 text-white font-bold rounded-2xl shadow-lg flex items-center justify-between px-6 active:scale-95 transition-all">
        <span class="text-lg">🛒 Créer une semaine</span>
        <span class="text-2xl">➔</span>
      </button>

      <button type="button" onclick="changerVue('vue_consult')" class="h-20 bg-emerald-500 text-white font-bold rounded-2xl shadow-lg flex items-center justify-between px-6 active:scale-95 transition-all">
        <span class="text-lg">🍳 Cuisiner (Détails)</span>
        <span class="text-2xl">➔</span>
      </button>

      <button type="button" onclick="changerVue('vue_ajout')" class="h-20 bg-orange-500 text-white font-bold rounded-2xl shadow-lg flex items-center justify-between px-6 active:scale-95 transition-all">
        <span class="text-lg">➕ Ajouter une recette</span>
        <span class="text-2xl">➔</span>
      </button>
    </div>

    <div id="vue_menus" class="etape hidden flex flex-col gap-3 w-full max-w-md mx-auto">
      <button type="button" onclick="changerVue('menu_principal')" class="text-slate-500 font-bold py-2 text-left w-fit">⬅ Retour menu</button>
      <h2 class="text-xl font-bold text-indigo-700 text-center mb-2">Mes Semaines</h2>
      <div id="conteneur_menus" class="flex flex-col gap-5">
        <p class="text-center text-slate-500 animate-pulse">Chargement de tes menus...</p>
      </div>
    </div>

    <div id="etape1" class="etape hidden flex flex-col gap-3 w-full max-w-md mx-auto">
      <button type="button" onclick="changerVue('menu_principal')" class="text-slate-500 font-bold p-2 text-left w-fit">⬅ Retour menu</button>
      <h2 class="text-xl font-bold text-center text-slate-700 mt-2 mb-2">Planifier la semaine</h2>
      <div class="bg-white p-4 sm:p-5 rounded-2xl shadow-sm border border-slate-200">
        <label class="block font-semibold text-slate-600 mb-2 text-sm">Nombre de plats à préparer :</label>
        <input type="number" id="nb_repas" value="5" min="1" inputmode="numeric" 
               class="w-full min-h-[48px] text-lg p-3 border border-slate-300 rounded-xl bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
      </div>
      <button type="button" id="btn_suivant" onclick="genForm()" disabled
              class="w-full min-h-[50px] bg-slate-400 text-white font-bold text-base rounded-xl shadow-md transition-all">
        Chargement des recettes...
      </button>
    </div>
    
    <div id="etape2" class="etape hidden flex flex-col gap-3 w-full max-w-md mx-auto">
      <h2 class="text-xl font-bold text-center text-slate-700 mt-2 mb-1">Détails des plats</h2>
      <div id="form_repas" class="flex flex-col gap-4"></div>
      
      <p id="msg_erreur" class="text-red-500 font-bold text-sm text-center hidden">⚠️ N'oublie pas de choisir une recette !</p>

      <div class="flex gap-2 mt-1">
        <button type="button" onclick="changerVue('etape1')" 
                class="w-1/3 min-h-[50px] bg-slate-200 text-slate-700 font-bold text-base rounded-xl active:bg-slate-300 transition-all">
          Retour
        </button>
        <button type="button" onclick="calcul()" 
                class="w-2/3 min-h-[50px] bg-blue-500 text-white font-bold text-base rounded-xl shadow-md active:bg-blue-600 transition-all">
          Générer & Sauvegarder
        </button>
      </div>
    </div>

    <div id="etape3" class="etape hidden flex flex-col gap-3 w-full max-w-md mx-auto">
      <h2 class="text-xl font-bold text-center text-slate-700 mt-2 mb-1">🛒 Ma liste</h2>
      
      <div class="bg-white p-2 rounded-2xl shadow-sm border border-slate-200 flex gap-2 items-center">
        <input type="text" id="ajout_manuel" placeholder="Ajouter (Lait...)" 
               class="flex-grow min-h-[44px] p-2 text-sm border border-slate-300 rounded-xl bg-slate-50 focus:outline-none focus:ring-2 focus:ring-green-500 transition-all">
        <button type="button" onclick="ajouterIngredient()" 
                class="min-w-[44px] min-h-[44px] w-11 bg-slate-200 text-slate-700 font-bold text-xl rounded-xl active:bg-slate-300 transition-all flex items-center justify-center">
          ➕
        </button>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-green-200 overflow-hidden w-full">
        <ul id="liste" class="divide-y divide-slate-100"></ul>
      </div>
      
      <div class="flex gap-2 mt-1 w-full">
        <button type="button" onclick="partage('Menu')" class="w-1/2 min-h-[56px] bg-blue-500 text-white font-bold rounded-xl shadow-md flex flex-col items-center justify-center p-2">
          <span class="text-lg leading-none mb-1">🍽️</span>
          <span class="text-xs sm:text-sm">Le Menu</span>
        </button>
        <button type="button" onclick="partage('Courses')" class="w-1/2 min-h-[56px] bg-green-500 text-white font-bold rounded-xl shadow-md flex flex-col items-center justify-center p-2">
          <span class="text-lg leading-none mb-1">🛒</span>
          <span class="text-xs sm:text-sm">Les Courses</span>
        </button>
      </div>

      <div class="flex gap-2 mt-1 w-full">
        <button type="button" onclick="changerVue('menu_principal')" class="w-full min-h-[50px] bg-slate-800 text-white font-bold text-base rounded-xl">
          Menu principal
        </button>
      </div>
    </div>

    <div id="vue_consult" class="etape hidden flex flex-col gap-3 w-full max-w-md mx-auto">
      <button type="button" onclick="changerVue('menu_principal')" class="text-slate-500 font-bold py-2 text-left w-fit">⬅ Retour menu</button>
      <h2 class="text-xl font-bold text-emerald-700 text-center">Détails recette</h2>
      <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col gap-3">
        <select id="select_consult" class="w-full h-12 border rounded-lg p-2 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-emerald-500" onchange="afficherDetails()"></select>
        <div class="flex items-center justify-between gap-4">
          <label class="font-bold text-sm text-slate-600">Nombre de parts :</label>
          <input type="number" id="parts_consult" value="5" min="1" class="w-20 h-10 text-center border border-slate-300 rounded-lg bg-slate-50" onchange="afficherDetails()">
        </div>
      </div>
      <div id="details_recette" class="bg-white rounded-2xl shadow-sm border border-slate-200 min-h-[100px] overflow-hidden">
        <p class="p-4 text-center text-slate-400 italic text-sm">Sélectionnez une recette pour voir les ingrédients.</p>
      </div>
    </div>

    <div id="vue_ajout" class="etape hidden flex flex-col gap-3 w-full max-w-md mx-auto">
      <button type="button" onclick="changerVue('menu_principal')" class="text-slate-500 font-bold py-2 text-left w-fit">⬅ Retour</button>
      <h2 class="text-xl font-bold text-orange-600 text-center">Nouvelle Recette</h2>
      
      <input type="text" id="new_nom" placeholder="Titre de la recette..." class="h-14 border border-slate-300 rounded-xl px-4 font-bold shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-500 w-full">
      
      <div id="new_ingredients_list" class="flex flex-col gap-2"></div>
      
      <button type="button" onclick="addIngRow()" class="h-12 bg-orange-50 text-orange-700 font-bold rounded-xl border-2 border-dashed border-orange-300 transition-all">
        ➕ Ajouter un ingrédient
      </button>
      
      <button type="button" id="btn_save" onclick="sauverRecette()" class="h-14 bg-orange-500 text-white font-bold text-lg rounded-xl shadow-md mt-2">
        💾 Enregistrer
      </button>
    </div>

    <script>
      const STEIN_API_URL = "https://api.steinhq.com/v1/storages/6a40132d92b1163e971007d3";
      let baseData = [], recs = [], plan = [];
      
      // Extraction de l'URL avec buster de cache pour éviter l'ancien stockage mobile
      function getFreshUrl(sheet) {
        return `${STEIN_API_URL}/${sheet}?_nocache=${Date.now()}`;
      }

      // --- INITIALISATION AUTOMATIQUE ---
      document.addEventListener('DOMContentLoaded', function() {
        chargerBaseRecettes();
      });

      function chargerBaseRecettes() {
        let btn = document.getElementById('btn_suivant');
        if(btn) btn.innerText = "Chargement des recettes...";

        fetch(getFreshUrl('Data'), { cache: "no-store" })
          .then(response => response.json())
          .then(data => {
            if (Array.isArray(data)) {
              baseData = data;
              recs = [...new Set(data.map(item => item && item.Titre).filter(t => t))];
              
              if(btn && recs.length > 0) {
                btn.disabled = false;
                btn.classList.remove('bg-slate-400');
                btn.classList.add('bg-blue-500');
                btn.innerText = 'Suivant';
              }
            }
          })
          .catch(err => {
            if(btn) btn.innerText = "Erreur de synchronisation Data";
            console.error(err);
          });
      }

      // Changement de vue sécurisé (ne dépend pas du succès des requêtes)
      function changerVue(id) {
        document.querySelectorAll('.etape').forEach(e => e.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        
        if(id === 'vue_consult') {
          let optionsSafe = (recs || []).map(r => `<option value="${String(r).replace(/"/g, '&quot;')}">${String(r)}</option>`).join('');
          let currentSelect = document.getElementById('select_consult').value; 
          document.getElementById('select_consult').innerHTML = '<option value="">Sélectionner une recette...</option>' + optionsSafe;
          if (currentSelect) document.getElementById('select_consult').value = currentSelect;
        }
      }

      // --- HISTORIQUE ALIGNÉ SUR L'ONGLET 'Menus_Sauvegardes' ---
      function chargerMenus() {
        changerVue('vue_menus');
        document.getElementById('conteneur_menus').innerHTML = '<p class="text-center text-slate-500 animate-pulse mt-4">Chargement de l\'historique...</p>';
        
        fetch(getFreshUrl('Menus_Sauvegardes'), { cache: "no-store" })
          .then(response => response.json())
          .then(data => {
            let box = document.getElementById('conteneur_menus');
            if(!Array.isArray(data) || data.length === 0) {
              box.innerHTML = '<p class="text-center text-slate-500 mt-4">Aucun menu planifié.</p>';
              return;
            }

            let groupes = {};
            data.forEach(row => {
              if(!row || !row.id_menu) return;
              if(!groupes[row.id_menu]) {
                groupes[row.id_menu] = { date: row.date_creation, repas: [] };
              }
              groupes[row.id_menu].repas.push({
                titre: row.titre_repas,
                recette: row.recette,
                couverts: row.couverts
              });
            });

            let lots = Object.values(groupes).reverse();

            let html = '';
            lots.forEach((lot, index) => {
              let titreBloc = (index === 0 && lots.length > 1) ? "🔵 Semaine prochaine" : (index === 1 ? "🟢 Semaine en cours" : "Semaine");
              
              html += `<div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                        <h3 class="font-black text-slate-700 border-b pb-2 mb-3 text-sm">${titreBloc} <span class="text-xs font-normal text-slate-400 block mt-1">Créé le ${lot.date}</span></h3>
                        <div class="flex flex-col gap-2">`;
              
              lot.repas.forEach(r => {
                let recSafe = String(r.recette).replace(/'/g, "\\'").replace(/"/g, '&quot;');
                html += `
                  <div onclick="cuisinerRaccourci('${recSafe}', ${r.couverts})" class="bg-slate-50 p-3 rounded-xl border border-slate-100 active:bg-slate-100 transition-all cursor-pointer">
                    <p class="font-bold text-indigo-700 text-sm mb-1">${r.titre}</p>
                    <p class="text-slate-600 text-sm flex justify-between items-center">
                      <span>🍲 ${r.recette} <span class="text-xs opacity-70">(${r.couverts} p.)</span></span>
                      <span class="text-xs bg-white border px-2 py-1 rounded-md shadow-sm">👉 Cuisiner</span>
                    </p>
                  </div>`;
              });
              html += `</div></div>`;
            });
            box.innerHTML = html;
          })
          .catch(err => {
            document.getElementById('conteneur_menus').innerHTML = '<p class="text-center text-red-500 mt-4">Erreur lors de la récupération de l\'historique.</p>';
          });
      }

      function cuisinerRaccourci(recette, couverts) {
        changerVue('vue_consult');
        document.getElementById('select_consult').value = recette;
        document.getElementById('parts_consult').value = couverts;
        afficherDetails();
      }

      // --- PLANIFICATION ---
      function genForm() {
        let n = document.getElementById('nb_repas').value;
        let h = '';
        let optionsHTML = '<option value="">Sélectionne un menu</option>' + (recs || []).map(r => `<option value="${String(r).replace(/"/g, '&quot;')}">${String(r)}</option>`).join('');

        const joursData = [
          { label: 'Lu', val: 'lundi' }, { label: 'Ma', val: 'mardi' }, { label: 'Me', val: 'mercredi' },
          { label: 'Je', val: 'jeudi' }, { label: 'Ve', val: 'vendredi' }, { label: 'Sa', val: 'samedi' }, { label: 'Di', val: 'dimanche' }
        ];

        for(let i=1; i<=n; i++) {
          let gridHTML = '<div class="grid grid-cols-7 gap-1 mt-3 mb-2">';
          joursData.forEach(j => {
            gridHTML += `
              <div class="flex flex-col gap-1 items-center">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${j.label}</span>
                <button type="button" class="slot-btn w-full aspect-square min-h-[44px] rounded-lg bg-slate-100 text-slate-400 text-lg border border-slate-200 active:scale-90 transition-all flex items-center justify-center" data-val="${j.val} midi" onclick="toggleSlot(this)">☀️</button>
                <button type="button" class="slot-btn w-full aspect-square min-h-[44px] rounded-lg bg-slate-100 text-slate-400 text-lg border border-slate-200 active:scale-90 transition-all flex items-center justify-center" data-val="${j.val} soir" onclick="toggleSlot(this)">🌙</button>
              </div>`;
          });
          gridHTML += '</div>';

          h += `
            <div class="repas-card bg-white p-4 rounded-xl shadow-sm border border-slate-200 border-l-4 border-l-blue-500 flex flex-col gap-2">
              <div class="flex flex-col mb-1 border-b border-dashed border-slate-200 pb-2">
                <span class="titre-display text-base font-bold text-slate-400 leading-tight">Sélectionne les jours 👇</span>
                <input type="hidden" class="titre" value="Repas non défini">
              </div>
              ${gridHTML}
              <div class="flex items-center justify-between gap-2 mt-2">
                <label class="font-semibold text-slate-600 text-xs whitespace-nowrap">Personnes :</label>
                <input type="number" class="couverts w-16 min-h-[44px] text-sm text-center border border-slate-300 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" value="5" min="1" inputmode="numeric">
              </div>
              <select class="recette w-full min-h-[44px] text-sm p-2 border border-slate-300 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                ${optionsHTML}
              </select>
            </div>`;
        }
        document.getElementById('form_repas').innerHTML = h;
        changerVue('etape2');
      }

      function toggleSlot(btn) {
        btn.classList.toggle('bg-blue-100');
        btn.classList.toggle('border-blue-400');
        btn.classList.toggle('bg-slate-100');
        btn.classList.toggle('border-slate-200');
        
        let card = btn.closest('.repas-card');
        let actives = card.querySelectorAll('.slot-btn.bg-blue-100');
        let titleDisplay = card.querySelector('.titre-display');
        let titleInput = card.querySelector('.titre');
        
        if (actives.length > 0) {
            let slotsArr = Array.from(actives).map(b => b.getAttribute('data-val'));
            let slotsFormates = "";
            
            if (slotsArr.length === 1) {
              slotsFormates = slotsArr[0];
            } else {
              let dernier = slotsArr.pop();
              slotsFormates = slotsArr.join(', ') + ' et ' + dernier;
            }

            slotsFormates = slotsFormates.charAt(0).toUpperCase() + slotsFormates.slice(1);
            titleDisplay.innerText = slotsFormates;
            titleInput.value = slotsFormates;
            titleDisplay.classList.remove('text-slate-400');
            titleDisplay.classList.add('text-blue-700');
        } else {
            titleDisplay.innerText = "Sélectionne les jours 👇";
            titleInput.value = "Repas non défini";
            titleDisplay.classList.add('text-slate-400');
            titleDisplay.classList.remove('text-blue-700');
        }
      }

      function calcul() {
        let blocks = document.querySelectorAll('.repas-card');
        let err = false;
        plan = [];
        
        blocks.forEach(b => {
          let sel = b.querySelector('.recette');
          let couv = b.querySelector('.couverts');
          if(!sel || !sel.value) { 
            if(sel) sel.classList.add('input-error'); 
            err = true; 
          } else { 
            if(sel) sel.classList.remove('input-error'); 
            plan.push({ nom: b.querySelector('.titre').value, recette: sel.value, couverts: parseInt(couv.value) || 1 }); 
          }
        });
        
        let msgBox = document.getElementById('msg_erreur');
        if(err) { msgBox.classList.remove('hidden'); return; } else { msgBox.classList.add('hidden'); }
        
        changerVue('etape3');
        document.getElementById('liste').innerHTML = '<li class="p-4 text-center text-slate-500 animate-pulse text-sm">Calcul et sauvegarde en cours...</li>';
        
        let idMenu = Date.now();
        let dateStr = new Date().toLocaleDateString('fr-FR') + ' à ' + new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
        
        let payloadMenu = plan.map(p => ({
          id_menu: idMenu,
          date_creation: dateStr,
          titre_repas: p.nom,
          recette: p.recette,
          couverts: p.couverts
        }));

        fetch(getFreshUrl('Menus_Sauvegardes'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payloadMenu)
        }).catch(e => console.error("Erreur d'écriture historique", e));

        let mapCourses = {};
        baseData.forEach(ligne => {
          if(!ligne || !ligne.Titre) return;
          let titre = String(ligne.Titre).trim().toLowerCase();
          plan.forEach(repas => {
            if (String(repas.recette).trim().toLowerCase() === titre) {
              let qteTotale = (parseFloat(String(ligne.Quantite_Base).replace(',', '.')) || 0) * repas.couverts;
              if (mapCourses[ligne.Ingredient]) {
                mapCourses[ligne.Ingredient].quantite += qteTotale;
              } else {
                mapCourses[ligne.Ingredient] = { quantite: qteTotale, unite: ligne.Unite || "" };
              }
            }
          });
        });

        let htmlContent = '';
        for (let ing in mapCourses) {
          let qte = mapCourses[ing].quantite > 0 ? Number(mapCourses[ing].quantite.toFixed(2)) : "";
          htmlContent += `
            <li class="flex items-center justify-between p-3 bg-white hover:bg-slate-50 transition-colors w-full">
              <div class="flex-grow pr-2 min-w-0">
                <span class="font-bold text-slate-800 text-sm break-words">${ing}</span> 
                <span class="text-blue-600 font-semibold ml-1 text-sm whitespace-nowrap">${qte} ${mapCourses[ing].unite}</span>
              </div>
              <button type="button" class="delete min-w-[40px] min-h-[40px] w-10 flex items-center justify-center bg-red-100 text-red-600 rounded-lg" onclick="this.parentElement.remove()">🗑️</button>
            </li>`;
        }
        
        if (!htmlContent) htmlContent = '<li class="p-4 text-center text-slate-500 text-sm">Aucun ingrédient trouvé.</li>';
        document.getElementById('liste').innerHTML = htmlContent;
      }

      function ajouterIngredient() {
        let input = document.getElementById('ajout_manuel');
        let valeur = input.value.trim();
        if(valeur !== "") {
          let liste = document.getElementById('liste');
          if(liste.innerHTML.includes("Aucun ingrédient") || liste.innerHTML.includes("Calcul et sauvegarde")) liste.innerHTML = '';
          liste.insertAdjacentHTML('beforeend', `
            <li class="flex items-center justify-between p-3 bg-white w-full">
              <span class="font-bold text-slate-800 text-sm">${valeur}</span>
              <button type="button" class="min-w-[40px] min-h-[40px] w-10 flex items-center justify-center bg-red-100 text-red-600 rounded-lg" onclick="this.parentElement.remove()">🗑️</button>
            </li>`);
          input.value = ""; 
        }
      }
      
      function partage(type) {
        let txt = type === 'Menu' ? "🍽️ MENU DE LA SEMAINE :\n\n" : "🛒 LISTE DE COURSES :\n\n";
        if (type === 'Menu') {
          plan.forEach(p => txt += `🗓️ ${p.nom}\n👉 ${p.recette} (${p.couverts} p.)\n\n`);
        } else {
          Array.from(document.querySelectorAll('#liste li')).forEach(l => {
            let texte = l.innerText.replace('🗑️', '').trim();
            if(texte && !texte.startsWith("⚠️")) txt += "- " + texte + "\n";
          });
        }
        navigator.share ? navigator.share({ title: "Chef Perso", text: txt }) : navigator.clipboard.writeText(txt).then(() => alert("Copié !"));
      }

      // --- CONSULTATION UNITAIRE RECETTE ---
      function afficherDetails() {
        let r = document.getElementById('select_consult').value;
        let p = parseInt(document.getElementById('parts_consult').value) || 5;
        if(!r) return;
        
        let h = '<ul class="divide-y divide-slate-100">';
        let trouve = false;
        
        baseData.forEach(it => {
          if(it && it.Titre && String(it.Titre).trim() === r) {
            trouve = true;
            let qteRaw = (parseFloat(String(it.Quantite_Base).replace(',', '.')) || 0) * p;
            let qte = qteRaw > 0 ? Number(qteRaw.toFixed(2)) : "";
            h += `<li class="p-3 flex justify-between bg-white"><span class="font-bold text-slate-800 text-sm">${it.Ingredient}</span><span class="text-emerald-600 font-semibold text-sm">${qte} ${it.Unite || ""}</span></li>`;
          }
        });
        
        if (!trouve) h = '<p class="p-4 text-center text-slate-500">Aucun ingrédient trouvé.</p>';
        else h += '</ul>';
        
        document.getElementById('details_recette').innerHTML = h;
      }

      // --- FORMULAIRE ET ENREGISTREMENT AJOUTS ---
      function addIngRow() {
        let div = document.createElement('div');
        div.className = "flex gap-2 items-center bg-white p-2 rounded-xl border border-orange-200";
        div.innerHTML = `<input type="text" placeholder="Ingrédient" class="ing-nom flex-grow h-10 border-b outline-none text-sm bg-transparent"><input type="text" placeholder="Qté" class="ing-qte w-20 h-10 border-b outline-none text-sm text-center bg-transparent"><button type="button" onclick="this.parentElement.remove()" class="min-w-[40px] h-10 text-red-500 bg-red-50 rounded-lg">🗑️</button>`;
        document.getElementById('new_ingredients_list').appendChild(div);
      }

      function sauverRecette() {
        let nom = document.getElementById('new_nom').value.trim();
        let rawPayload = [];
        
        document.querySelectorAll('#new_ingredients_list > div').forEach(l => {
          let n = l.querySelector('.ing-nom').value.trim();
          let q = l.querySelector('.ing-qte').value.trim();
          if(n) rawPayload.push({ titre_recette: nom, Ingredient: n, quantite: q });
        });
        
        if(!nom || rawPayload.length === 0) return alert("⚠️ Nom et ingrédients requis.");
        
        let btn = document.getElementById('btn_save');
        btn.innerText = "⏳ Enregistrement..."; btn.disabled = true;

        fetch(getFreshUrl('Brut'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(rawPayload)
        })
        .then(() => {
          alert("✅ Recette enregistrée avec succès dans l'onglet Brut !"); 
          chargerBaseRecettes(); // Rechargement forcé en arrière-plan
          changerVue('menu_principal');
          document.getElementById('new_nom').value = '';
          document.getElementById('new_ingredients_list').innerHTML = '';
          btn.innerText = "💾 Enregistrer"; btn.disabled = false;
        })
        .catch(err => {
          alert("Erreur de communication avec l'API Stein.");
          btn.innerText = "💾 Enregistrer"; 
          btn.disabled = false;
        });
      }
    </script>
  </body>
</html>
